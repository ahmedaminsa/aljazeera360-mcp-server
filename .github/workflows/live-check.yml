name: Live API Check

# Daily smoke test against the real Al Jazeera 360 API and the Cloudflare deployment.
# The upstream Vesper/Dice API is reverse-engineered and can change without notice
# (it already did once — see commit history). A failing run here means the server
# is likely broken for users; GitHub emails the repo owner on scheduled-run failures.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  live-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live API smoke test
        env:
          AJ360_API_KEY: ${{ secrets.AJ360_API_KEY }}
          AJ360_REFRESH_TOKEN: ${{ secrets.AJ360_REFRESH_TOKEN }}
        run: python test_server.py

  deployment-health:
    runs-on: ubuntu-latest
    env:
      DEPLOY_URL: https://aljazeera360-mcp.ahmed-26d.workers.dev
    steps:
      - name: Check Cloudflare deployment health
        run: |
          # First request may cold-start the container — retry a few times.
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 "$DEPLOY_URL/api/health")
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && break
            sleep 15
          done
          test "$code" = "200"

      - name: Check MCP endpoint responds
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 \
            -X POST "$DEPLOY_URL/mcp" \
            -H "Accept: application/json, text/event-stream" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"live-check","version":"1.0"}}}')
          echo "MCP initialize returned HTTP $code"
          test "$code" = "200"
