name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify server imports
        run: python -c "from server import mcp, client, main; print('✅ Server imports OK')"

      - name: Run live API tests
        run: python test_server.py
        continue-on-error: true  # Live API tests may fail due to network/rate limits

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aljazeera360-mcp .

      - name: Verify Docker image
        run: docker run --rm aljazeera360-mcp python -c "from server import mcp; print('✅ Docker OK')"
