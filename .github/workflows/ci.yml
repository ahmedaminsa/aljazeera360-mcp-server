name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify server imports
        run: python -c "from server import mcp, AlJazeera360Client, TokenManager; print('✅ All imports OK')"

      - name: Verify tool profiles
        run: |
          python -c "
          from server import mcp
          tools = mcp._tool_manager._tools if hasattr(mcp, '_tool_manager') else {}
          print(f'✅ default profile: {len(tools)} tools registered')
          assert len(tools) == 8, f'Default profile: expected 8 core tools, got {len(tools)}'
          "
          AJ360_ENABLE_SEO_TOOLS=1 python -c "
          from server import mcp
          tools = mcp._tool_manager._tools if hasattr(mcp, '_tool_manager') else {}
          print(f'✅ full profile: {len(tools)} tools registered')
          assert len(tools) == 24, f'Full profile: expected 24 tools, got {len(tools)}'
          "

      - name: Run integration tests
        if: github.event_name == 'push'
        env:
          AJ360_REFRESH_TOKEN: ${{ secrets.AJ360_REFRESH_TOKEN }}
        run: python test_server.py
        continue-on-error: true
