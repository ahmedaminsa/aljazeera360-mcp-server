# ===========================
# This file cannot be pushed via the API due to permission restrictions.
# To add it to your repository:
#
# 1. Go to https://github.com/ahmedaminsa/aljazeera360-mcp-server
# 2. Click "Add file" → "Create new file"
# 3. Name it: .github/workflows/ci.yml
# 4. Paste the content below (everything after this comment block)
# 5. Click "Commit changes"
#
# ---

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify server imports
        run: python -c "from server import mcp, AlJazeera360Client, TokenManager; print('✅ All imports OK')"

      - name: Verify tools registered
        run: |
          python -c "
          from server import mcp
          tools = mcp._tool_manager._tools if hasattr(mcp, '_tool_manager') else {}
          print(f'✅ {len(tools)} tools registered')
          assert len(tools) >= 8, f'Expected 8+ tools, got {len(tools)}'
          "

      - name: Run integration tests
        if: github.event_name == 'push'
        env:
          AJ360_REFRESH_TOKEN: ${{ secrets.AJ360_REFRESH_TOKEN }}
        run: python test_server.py
        continue-on-error: true  # Don't fail CI if API is temporarily down
